<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Press Enter</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            font-size: 2em;
            overflow: hidden; /* Prevent scrollbars */
        }

        #press-enter {
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="press-enter">
        Press Enter to continue...
    </div>

    <script>
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                // Replace 'YOUR_WEBSITE_URL_HERE' with the actual URL of your site
                window.location.href = https://skidsrweird.vercel.app/;
            }
        });
    </script>

</body>
</html>
