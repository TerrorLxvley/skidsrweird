}

}
@keyframes rainbow-glow {
  0% {
    border-color: transparent;
    box-shadow: none;
  }
  20% {
    border-color: #ff0000;
    box-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
  }
  40% {

  60% {

  80% {

  100% {

  42% { color: #00ff00; }
  56% { color: #0000ff; }

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const hoaMusic = document.getElementById('hoa-music');
    const roiMusic = document.getElementById('roi-music');
    const volumeSlider = document.getElementById('volume-slider');
    const HOATab = document.querySelector('.tab[data-tab="HOA"]');
    const ownersTab = document.querySelector('.tab[data-tab="Owners"]');

    let currentMusic = hoaMusic;
    const initialVolume = 0.6;

    if (hoaMusic && roiMusic && volumeSlider) {
      volumeSlider.value = initialVolume;
      hoaMusic.volume = initialVolume;
      roiMusic.volume = initialVolume;

      const playHoaMusic = function() {
        roiMusic.pause();
        roiMusic.currentTime = 0;
        hoaMusic.play().catch(e => console.error('Error playing HOA music:', e));
        currentMusic = hoaMusic;
      };

      const playRoiMusic = function() {
        hoaMusic.pause();
        hoaMusic.currentTime = 0;
        roiMusic.play().catch(e => console.error('Error playing ROI music:', e));
        currentMusic = roiMusic;
      };

      const updateVolume = function() {
        if (currentMusic && volumeSlider) {
          currentMusic.volume = volumeSlider.value;
        }
      };

      volumeSlider.addEventListener('input', updateVolume);

      if (HOATab) {
        HOATab.addEventListener('click', function() {
          if (currentMusic !== roiMusic) {
            playRoiMusic();
          }
        });
      }

      if (ownersTab) {
        ownersTab.addEventListener('click', function() {
          if (currentMusic !== hoaMusic) {
            playHoaMusic();
          }
        });
      }

      const initialPlayPromise = hoaMusic.play();
      if (initialPlayPromise !== undefined) {
        initialPlayPromise.then(() => {
          console.log('Initial audio playback started successfully');
        }).catch(error => {
          console.log('Initial auto-play was prevented. Will play on interaction:', error);
        });
      }
    }
  });
</script>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const overlay = document.getElementById('overlay');
    const websiteContent = document.getElementById('website-content');
    const hoaMusic = document.getElementById('hoa-music');
    const roiMusic = document.getElementById('roi-music');

    websiteContent.classList.add('blurred');

    const handleInteraction = function() {
      websiteContent.classList.remove('blurred');
      overlay.style.display = 'none';

      const activeTab = document.querySelector('.tabs .tab.active');
      let musicToPlay = null;
      if (activeTab && activeTab.dataset.tab === 'HOA') {
        musicToPlay = roiMusic;
      } else {
        musicToPlay = hoaMusic;
      }

      if (musicToPlay && musicToPlay.paused) {
        musicToPlay.play().catch(e => console.error('Error playing music on interaction:', e));
      }

      document.removeEventListener('keydown', handleInteractionOnEnter);
      overlay.removeEventListener('click', handleInteraction);
    };

    const handleInteractionOnEnter = function(event) {
      if (event.key === 'Enter') {
        handleInteraction();
      }
    };

    document.addEventListener('keydown', handleInteractionOnEnter);
    overlay.addEventListener('click', handleInteraction);

    const h2Elements = document.querySelectorAll('.card h2');
    h2Elements.forEach(h2 => {
      const text = h2.textContent;
      h2.innerHTML = '';
      text.split('').forEach((letter, index) => {
        const span = document.createElement('span');
        span.textContent = letter;
        span.style.setProperty('--index', index);
        h2.appendChild(span);
      });
    });
  });
</script>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const tabs = document.querySelectorAll('.tabs .tab');
    const tabContents = document.querySelectorAll('.tab-content');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tabContents.forEach(tc => {
          tc.style.display = 'none';
        });
        tab.classList.add('active');
        const activeTab = tab.dataset.tab;
        const activeContent = document.getElementById(activeTab);
        if (activeContent) {
          activeContent.style.display = 'block';
        }
      });
    });

    const videoInput = document.getElementById('video-upload');
    const depotVideo = document.getElementById('depot-video');

    if (videoInput && depotVideo) {
      videoInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file && file.type === 'video/mp4') {
          const url = URL.createObjectURL(file);
          depotVideo.src = url;
          depotVideo.style.display = 'block';
          depotVideo.play().catch(e => console.error('Error playing uploaded video:', e));
        } else {
          alert('Please select a valid MP4 video file.');
        }
      });
    }
  });
</script>
